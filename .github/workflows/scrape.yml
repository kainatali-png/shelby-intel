name: Shelby County Lead Scraper
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium
      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: "7"
      # ── NEW: upload debug files so we can see what Playwright sees ──────────
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: data/debug/
          retention-days: 3
      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads_ghl.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
