name: Shelby County Lead Scraper

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 02:00 CT
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── python setup ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread playwright

      # ── playwright ──────────────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # ── run scraper ─────────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: "7"

      # ── commit results ──────────────────────────────────────────────────────
      - name: Commit records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads_ghl.csv || true
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # pick up the just-pushed commit

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
